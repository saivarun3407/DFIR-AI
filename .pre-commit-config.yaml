repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^mcp-server/(src|tests)/
      - id: ruff-format
        files: ^mcp-server/(src|tests)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key

  - repo: local
    hooks:
      - id: license-at-top
        name: LICENSE Apache-2.0 detectable at root
        entry: bash -c 'head -1 LICENSE | grep -qi "Apache License" && grep -q "Version 2.0" LICENSE'
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest (mcp-server unit tests)
        entry: bash -c 'cd mcp-server && PYTHONPATH=src python3 -m pytest tests -q --no-cov 2>&1 | tail -20'
        language: system
        pass_filenames: false
        files: ^mcp-server/(src|tests)/
        require_serial: true
