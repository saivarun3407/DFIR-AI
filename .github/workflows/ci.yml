name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "./mcp-server[dev]"
      - name: Lint
        run: ruff check mcp-server/src
      - name: Typecheck
        run: mypy --config-file mcp-server/pyproject.toml mcp-server/src/protocol_sift_mcp || true
      - name: Tests
        run: pytest mcp-server/tests
